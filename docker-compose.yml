version: '3.8'
services:
  db:
    build: ./db
    env_file: .env  # Load environment variables from .env file
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    env_file: .env  # Load environment variables from .env file
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./downloads:/app/data
    networks:
      - app_network
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    networks:
      - app_network
    ports:
      - "5173:5173"
    environment:   
      - VITE_API_URL=http://localhost:3000  
    depends_on:
      - backend

volumes:
  db_data:

networks:
  app_network: